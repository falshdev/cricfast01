<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CricFast Live</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="sidebar-header" style="justify-content: center; padding: 0 0 2rem 0;">
                <div class="logo-icon">CF</div>
                <h2 style="margin: 0;">CricFast Admin</h2>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Login to Dashboard</button>
            </form>
            <div id="loginError"
                style="color: var(--accent); text-align: center; margin-top: 1rem; font-size: 0.875rem; display: none;">
                Invalid username or password
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (Auth.login(user, pass)) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });
    </script>
</body>

</html>
